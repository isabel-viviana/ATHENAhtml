<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<link rel="stylesheet" href="../../styles/authentication.css">
</head>
<body>

<div class="auth-container">

<div class="auth-left">
    
    <div class="brand">
        <img src="logo.png">
        <h1>ATHENA</h1>
    </div>
    <p>Vamos paso por paso.</p>
    <img src="cat.png">
</div>

<div class="auth-right">
<div class="auth-box">

<h2>Acceso administrador ATHENA</h2>
<p>Ingresa tus credenciales para continuar.</p>

<form>
<input type="email" class="auth-input" placeholder="Correo electrónico">
<input type="password" class="auth-input" placeholder="Contraseña">

<button type="submit" class="auth-button">Iniciar sesión</button>
</form>

<div class="auth-links">
    <a href="#">Crear cuenta</a>
    <a href="#">¿Olvidaste tu contraseña?</a>
</div>

</div>
</div>

</div>

</body>
</html>
