<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Recuperar contraseña</title>
        <link rel="stylesheet" href="forgot_password.css" />
        <link rel="stylesheet" href="../../assets/css/theme.css" />
    </head>
    <body>
        <div class="forgot-page">
            <!-- vista recuperacion:
                 - .forgot-page: centra el contenido y maneja decoracion (blobs) sin afectar el card
                 - .forgot-card: contiene copy + form + link de retorno -->
            <div class="forgot-card">
                <h2>Recuperar contraseña</h2>

                <p>
                    Introduce tu correo electrónico y te enviaremos un enlace
                    para restablecer tu contraseña.
                </p>

                <form class="forgot-form" action="reset_password.html">
                    <input
                        type="email"
                        placeholder="Correo electrónico"
                        class="input-field"
                        required
                    />

                    <button type="submit" class="btn-primary">
                        Enviar enlace
                    </button>
                </form>

                <div class="forgot-footer">
                    <a href="login_student.html">Volver al login</a>
                </div>
            </div>
        </div>
    </body>
</html>
