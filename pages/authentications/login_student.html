<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena - Iniciar Sesión</title>
    <link rel="stylesheet" href="login_student.css">
    <!-- Usaremos Font Awesome para los logos de redes sociales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <!-- Panel Izquierdo -->
        <div class="left-panel">
            <div class="logo-top">
                <img src="https://via.placeholder.com/40" alt="Logo Athena" class="small-logo">
                <h1>ATHENA</h1>
            </div>
            <p class="subtitle">Vamos paso por paso.</p>
            <div class="mascot-container">
                <!-- Aquí iría la imagen del zorro con lentes -->
                <img src="../../images/Zorrito_13D.png" alt="Mascota Athena con gafas" class="mascot">
            </div>
        </div>

        <!-- Panel Derecho -->
        <div class="right-panel">
            <div class="form-container">
                <h2>Ingresa a tu cuenta de estudiante ATHENA</h2>
                <p class="description">Ingresa tu correo o número para continuar.</p>

                <form>
                    <input type="text" placeholder="Correo electrónico" class="input-field">
                    <input type="password" placeholder="Contraseña" class="input-field password-input">
                    <button type="submit" class="btn-primary">Iniciar sesión</button>
                </form>

                <div class="divider">
                    <span>ó</span>
                </div>

                <div class="social-buttons">
                    <button class="btn-social">
                        <i class="fab fa-google"></i> Continuar con Google
                    </button>
                    <button class="btn-social">
                        <i class="fab fa-facebook-f"></i> Continuar con Facebook
                    </button>
                    <button class="btn-social">
                        <i class="fab fa-apple"></i> Continuar con Apple
                    </button>
                </div>

                <div class="footer-section">
                    <p class="terms-text">
                        Al continuar, aceptas Términos y Condiciones y Política de privacidad
                    </p>
                    <div class="footer-links">
                        <a href="register_student.html">Crear cuenta</a>
                        <a href="forgot_password.html">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
