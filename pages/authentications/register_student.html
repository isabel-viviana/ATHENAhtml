<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
<link rel="stylesheet" href="../../styles/authentication.css">
</head>
<body>

<div class="auth-container">

<div class="auth-left">
    <div class="brand">
        <img src="logo.png">
        <h1>ATHENA</h1>
    </div>
    <p>Vamos paso por paso.</p>
    <img src="cat.png">
</div>

<div class="auth-right">
<div class="auth-box">

<h2>Crear cuenta estudiante</h2>
<p>Ingresa tu correo o número para continuar.</p>

<form>
<input type="text" class="auth-input" placeholder="Correo o número">
<button type="submit" class="auth-button">Continuar</button>
</form>

<div class="divider"><span></span> ó <span></span></div>

<button class="social-btn">Continuar con Google</button>
<button class="social-btn">Continuar con Facebook</button>
<button class="social-btn">Continuar con Apple</button>

</div>
</div>

</div>

</body>
</html>
