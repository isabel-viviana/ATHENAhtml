<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Athena - Registro</title>
        <link rel="stylesheet" href="register_student.css" />
        <link rel="stylesheet" href="../../assets/css/theme.css" />

        <!-- Usaremos Font Awesome para los logos de redes sociales -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        />
    </head>
    <body>
        <div class="main-container">
            <!-- Panel Izquierdo -->
            <div class="left-panel">
                <div class="logo-top">
                    <img src="https://via.placeholder.com/40" alt="Logo" />
                    <h1>ATHENA</h1>
                </div>
                <p class="subtitle">Vamos paso por paso.</p>
                <div class="mascot-container">
                    <!-- Aquí iría la imagen del zorro con lentes -->
                    <img
                        src="../../images/Zorrito_13D.png"
                        alt="Mascota Athena"
                        class="mascot"
                    />
                </div>
            </div>

            <!-- Panel Derecho -->
            <div class="right-panel">
                <div class="form-container">
                    <h2>Crear cuenta estudiante</h2>
                    <p class="description">
                        Ingresa tu correo o número para continuar.
                    </p>

                    <form>
                        <input
                            type="text"
                            placeholder="Correo electrónico o número"
                            class="input-field"
                        />
                        <button type="submit" class="btn-primary">
                            Continuar
                        </button>
                    </form>

                    <div class="divider">
                        <span>ó</span>
                    </div>

                    <div class="social-buttons">
                        <button class="btn-social">
                            <i class="fab fa-google"></i> Continuar con Google
                        </button>
                        <button class="btn-social">
                            <i class="fab fa-facebook-f"></i> Continuar con
                            Facebook
                        </button>
                        <button class="btn-social">
                            <i class="fab fa-apple"></i> Continuar con Apple
                        </button>
                    </div>

                    <p class="footer-text">
                        Al continuar, aceptas Términos y Condiciones y Política
                        de privacidad
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
