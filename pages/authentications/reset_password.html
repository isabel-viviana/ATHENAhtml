<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Restablecer contraseña</title>
        <link rel="stylesheet" href="reset_password.css" />
        <link rel="stylesheet" href="../../assets/css/theme.css" />
    </head>
    <body>
        <div class="main-container reset-container">
            <!-- PANEL IZQUIERDO -->
            <div class="left-panel">
                <div class="logo-top">
                    <img
                        src="../../images/Zorrito_6.png"
                        alt="Logo Athena"
                        class="small-logo"
                    />
                    <h1>ATHENA</h1>
                </div>

                <p class="subtitle">Recupera el acceso a tu cuenta</p>

                <div class="mascot-container">
                    <img
                        src="../../images/Zorrito_2D.png"
                        alt="Mascota Athena"
                        class="mascot"
                    />
                </div>
            </div>

            <!-- PANEL DERECHO -->
            <div class="right-panel">
                <div class="form-container">
                    <h2>Restablecer contraseña</h2>

                    <p class="description">
                        Introduce tu nueva contraseña para continuar.
                    </p>

                    <form class="reset-form" action="login_student.html">
                        <input
                            type="password"
                            placeholder="Nueva contraseña"
                            class="input-field"
                            required
                        />

                        <input
                            type="password"
                            placeholder="Confirmar nueva contraseña"
                            class="input-field"
                            required
                        />

                        <!-- error eliminado porque era React dinámico -->

                        <button type="submit" class="btn-primary">
                            Guardar contraseña
                        </button>
                    </form>

                    <div class="divider">
                        <span>ó</span>
                    </div>

                    <div class="footer-section">
                        <p class="terms-text">¿Ya recuerdas tu contraseña?</p>

                        <div class="footer-links">
                            <a href="login_student.html">Volver al login</a>
                            <a href="register_student.html">Crear Cuenta</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
