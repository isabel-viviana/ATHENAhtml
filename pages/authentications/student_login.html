<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - diseñoATHENA</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="./">
</head>
<body>
    <main class="main-container">
        <section class="branding-section">
            <div class="branding-content">
                <div class="logo-container">
                    <img src="RUTA_DE_LA_IMAGEN_AQUI" alt="imagen" class="logo-icon">
                    <h1 class="brand-name">ATHENA</h1>
                </div>
                <p class="branding-subtitle">Vamos paso por paso.</p>
                <div class="mascot-container">
                    <img src="RUTA_DE_LA_IMAGEN_AQUI" alt="imagen" class="mascot-img">
                </div>
            </div>
        </section>

        <section class="form-section">
            <div class="form-wrapper">
                <h2 class="form-title">Crear cuenta estudiante</h2>
                <p class="form-subtitle">Ingresa tu correo o número para continuar.</p>

                <form class="auth-form">
                    <div class="input-group">
                        <input type="text" placeholder="Correo electrónico o número" class="main-input">
                    </div>
                    
                    <button type="submit" class="btn-cta">Continuar</button>
                    
                    <div class="divider">
                        <span>ó</span>
                    </div>

                    <div class="social-buttons">
                        <button type="button" class="btn-social">
                            <img src="RUTA_DE_LA_IMAGEN_AQUI" alt="imagen" class="social-icon">
                            Continuar con Google
                        </button>
                        <button type="button" class="btn-social">
                            <img src="RUTA_DE_LA_IMAGEN_AQUI" alt="imagen" class="social-icon">
                            Continuar con facebook
                        </button>
                        <button type="button" class="btn-social">
                            <img src="RUTA_DE_LA_IMAGEN_AQUI" alt="imagen" class="social-icon">
                            Continuar con Apple
                        </button>
                    </div>
                </form>

                <p class="legal-text">
                    Al continuar, aceptas Términos y Condiciones y Política de privacidad
                </p>
            </div>
        </section>
    </main>
    <script src="../../js/global.js"></script>
</body>
</html>
