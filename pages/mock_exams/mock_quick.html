<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ATHENA | Simulacro Rápido</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="stylesheet" href="/pages/mock_exams/mock_quick.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar__logo">
      <i class="fas fa-brain"></i>
      <span class="sidebar__brand">ATHENA</span>
    </div>

    <nav class="sidebar__nav">

      <a href="/pages/dashboards/dashboard.html" class="sidebar__link">
        <i class="fas fa-home"></i>
        <span>Inicio</span>
      </a>

      <a href="/pages/mock_exams/mock_config.html" class="sidebar__link sidebar__link--active">
        <i class="fas fa-clipboard-check"></i>
        <span>Simulacros</span>
      </a>

      <a href="/pages/practices/practice_config.html" class="sidebar__link">
        <i class="fas fa-dumbbell"></i>
        <span>Prácticas</span>
      </a>

      <a href="/pages/ai_tutor/chat.html" class="sidebar__link">
        <i class="fas fa-robot"></i>
        <span>Tutor IA</span>
      </a>

      <a href="/pages/statistics/statistics.html" class="sidebar__link">
        <i class="fas fa-chart-pie"></i>
        <span>Estadísticas</span>
      </a>

      <a href="/pages/profiles/profile.html" class="sidebar__link">
        <i class="fas fa-user-circle"></i>
        <span>Perfil</span>
      </a>

      <a href="/pages/profiles/profile_notifications.html" class="sidebar__link sidebar__link--notifications">
        <i class="fas fa-bell"></i>
        <span>Notificaciones</span>
        <span class="sidebar__badge">3</span>
      </a>

    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="main__content">

      <!-- QUIZ CONTAINER -->
      <section class="quiz-container">

        <!-- HEADER -->
        <div class="quiz-top">

          <div class="quiz-top__left">
            <span class="quiz-top__tag">
              <i class="fas fa-bolt"></i>
              SIMULACRO RÁPIDO
            </span>

            <h2>Lectura Crítica - Pregunta 1/10</h2>
          </div>

          <div class="quiz-top__timer">
            14:59
          </div>

        </div>

        <!-- QUESTION -->
        <div class="question-card">

          <p class="question-card__label">
            Lee el siguiente texto y responde:
          </p>

          <h3 class="question-card__text">
            El hombre es un fin en sí mismo, no un medio para los fines de otros...
          </h3>

        </div>

        <!-- OPTIONS -->
        <div class="options">

          <button class="option">
            <span class="option__letter">A</span>

            <span class="option__text">
              Que la humanidad debe instrumentalizarse.
            </span>
          </button>

          <button class="option option--selected">

            <span class="option__letter">
              B
            </span>

            <span class="option__text">
              El valor intrínseco de la persona humana según Kant.
            </span>

          </button>

        </div>

        <!-- FOOTER -->
        <div class="quiz-footer">

          <button class="finish-btn">
            Finalizar Prueba
          </button>

        </div>

      </section>

    </div>

    <!-- ASSISTANT -->
    <div class="assistant">

      <div class="assistant__message">
        ¡Concéntrate! Tú puedes con este simulacro.
      </div>

      <div class="assistant__bot">
        🤖
      </div>

    </div>

  </main>

</div>

</body>
</html>
