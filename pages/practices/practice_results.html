<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATHENA | Práctica Completada</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="/pages/practices/practice_results.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar__logo">
      <i class="fas fa-brain"></i>
      <span class="sidebar__brand">ATHENA</span>
    </div>

    <nav class="sidebar__nav">

      <a href="/pages/dashboards/dashboard.html" class="sidebar__link">
        <i class="fas fa-home"></i>
        <span>Inicio</span>
      </a>

      <a href="/pages/mock_exams/mock_config.html" class="sidebar__link">
        <i class="fas fa-clipboard-check"></i>
        <span>Simulacros</span>
      </a>

      <a href="/pages/practices/practice_config.html" class="sidebar__link sidebar__link--active">
        <i class="fas fa-dumbbell"></i>
        <span>Prácticas</span>
      </a>

      <a href="/pages/ai_tutor/chat.html" class="sidebar__link">
        <i class="fas fa-robot"></i>
        <span>Tutor IA</span>
      </a>

      <a href="/pages/statistics/statistics.html" class="sidebar__link">
        <i class="fas fa-chart-pie"></i>
        <span>Estadísticas</span>
      </a>

      <a href="/pages/profiles/profile.html" class="sidebar__link">
        <i class="fas fa-user-circle"></i>
        <span>Perfil</span>
      </a>

      <a href="/pages/profiles/profile_notifications.html" class="sidebar__link sidebar__link--notifications">
        <i class="fas fa-bell"></i>
        <span>Notificaciones</span>
        <span class="sidebar__badge">3</span>
      </a>

    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <section class="success-wrapper">

      <div class="success-card">

        <div class="success-icon">
          <i class="fas fa-bullseye"></i>
        </div>

        <h1>¡Práctica Completada!</h1>

        <p>
          Has sumado <strong>+15 XP</strong> a tu progreso en Matemáticas.
        </p>

        <div class="success-stats">

          <div class="mini-box">
            <span class="mini-box__label">XP Ganada</span>
            <h3>+15</h3>
          </div>

          <div class="mini-box">
            <span class="mini-box__label">Precisión</span>
            <h3>82%</h3>
          </div>

          <div class="mini-box">
            <span class="mini-box__label">Tiempo</span>
            <h3>14 min</h3>
          </div>

        </div>

        <div class="success-buttons">

          <button class="btn btn-secondary">
            Volver a Áreas
          </button>

          <button class="btn btn-primary">
            Continuar Practicando
          </button>

        </div>

      </div>

    </section>

  </main>

</div>

</body>
</html>
