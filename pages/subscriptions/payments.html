<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ATHENA | Resumen de Compra</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />

        <link rel="stylesheet" href="payments.css" />
        <link rel="stylesheet" href="../../assets/css/theme.css" />
    </head>

    <body>
        <div class="layout">
            <!-- SIDEBAR -->
            <aside class="sidebar">
                <div class="sidebar__logo">
                    <i class="fas fa-brain"></i>
                    <span class="sidebar__brand">ATHENA</span>
                </div>

                <nav class="sidebar__nav">
                    <a
                        href="../dashboards/dashboard.html"
                        class="sidebar__link"
                    >
                        <i class="fas fa-home"></i>
                        <span>Inicio</span>
                    </a>
                    <a
                        href="../mock_exams/mock_config.html"
                        class="sidebar__link"
                    >
                        <i class="fas fa-clipboard-check"></i>
                        <span>Simulacros</span>
                    </a>
                    <a
                        href="../practices/practice_config.html"
                        class="sidebar__link"
                    >
                        <i class="fas fa-dumbbell"></i>
                        <span>Prácticas</span>
                    </a>
                    <a href="../ai_tutor/chat.html" class="sidebar__link">
                        <i class="fas fa-robot"></i>
                        <span>Tutor IA</span>
                    </a>
                    <a
                        href="../statistics/statistics.html"
                        class="sidebar__link"
                    >
                        <i class="fas fa-chart-pie"></i>
                        <span>Estadísticas</span>
                    </a>
                    <a
                        href="../profiles/profile.html"
                        class="sidebar__link sidebar__link--active"
                    >
                        <i class="fas fa-user-circle"></i>
                        <span>Perfil</span>
                    </a>
                    <a
                        href="../profiles/profile_notifications.html"
                        class="sidebar__link sidebar__link--notifications"
                    >
                        <i class="fas fa-bell"></i>
                        <span>Notificaciones</span>
                        <span class="sidebar__badge">3</span>
                    </a>
                </nav>
            </aside>

            <!-- MAIN -->
            <main class="main">
                <div class="checkout-wrapper">
                    <a href="subscription.html" class="checkout-back">
                        ← Volver a planes
                    </a>

                    <h1 class="checkout-title">Resumen de Compra</h1>

                    <div class="checkout-grid">
                        <!-- PAYMENT -->
                        <section class="payment-card">
                            <div class="payment-card__header">
                                <i class="far fa-credit-card"></i>
                                <h2>Método de Pago</h2>
                            </div>

                            <form class="payment-form">
                                <div class="form-group">
                                    <label>NÚMERO DE TARJETA</label>

                                    <div class="input-icon">
                                        <i class="far fa-credit-card"></i>

                                        <input
                                            type="text"
                                            placeholder="0000 0000 0000 0000"
                                        />
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label>VENCIMIENTO</label>

                                        <input
                                            type="text"
                                            placeholder="MM/YY"
                                        />
                                    </div>

                                    <div class="form-group">
                                        <label>CVC</label>

                                        <input type="text" placeholder="123" />
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label>NOMBRE EN LA TARJETA</label>

                                    <input
                                        type="text"
                                        placeholder="Como aparece en la tarjeta"
                                    />
                                </div>
                            </form>

                            <div class="payment-secure">
                                <i class="fas fa-shield-alt"></i>
                                Pago 100% seguro y encriptado
                            </div>
                        </section>

                        <!-- ORDER -->
                        <aside class="summary-card">
                            <h2 class="summary-card__title">
                                Detalle del pedido
                            </h2>

                            <div class="summary-item">
                                <div>
                                    <h4>ATHENA Premium</h4>
                                    <span>(1 Mes)</span>
                                </div>

                                <p>$49.900</p>
                            </div>

                            <div class="summary-item summary-item--muted">
                                <span>Impuestos</span>
                                <span>Incluidos</span>
                            </div>

                            <div class="summary-divider"></div>

                            <div class="summary-total">
                                <span>Total</span>
                                <h3>$49.900</h3>
                            </div>

                            <button class="pay-button">Pagar $49.900</button>
                        </aside>
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
